name: Release

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prepare isolated HOME
        run: |
          HOME_DIR="$RUNNER_TEMP/agent-badge-home"
          mkdir -p "$HOME_DIR"
          echo "HOME=$HOME_DIR" >> "$GITHUB_ENV"

      - name: Typecheck
        run: npm run typecheck

      - name: Verify clean checkout release path
        run: npm run verify:clean-checkout

      - name: Require a changeset for publishable workspace changes (push)
        if: github.event_name == 'push'
        run: >-
          npm run release:changeset-check -- --base "${{ github.event.before }}"
          --head "${{ github.sha }}"

      - name: Version or publish
        uses: changesets/action@v1
        with:
          version: npm run changeset version
          publish: npm run release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
