name: Release

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      HOME: ${{ runner.temp }}/agent-badge-home
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prepare isolated HOME
        run: mkdir -p "$HOME"

      - name: Typecheck
        run: npm run typecheck

      - name: Verify clean checkout release path
        run: npm run verify:clean-checkout

      - name: Version or publish
        uses: changesets/action@v1
        with:
          version: npm run changeset version
          publish: npm run release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
