name: Release

on:
  workflow_dispatch:
  push:
    branches:
      - main

concurrency:
  group: release-main
  cancel-in-progress: true

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Skip recursive release commits
        if: github.event_name == 'push'
        id: release_commit
        run: |
          COMMIT_MESSAGE="$(git log -1 --pretty=%s)"
          if printf '%s\n' "$COMMIT_MESSAGE" | grep -q '^chore(release): publish '; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Release publish commit detected; skipping recursive release workflow."
            exit 0
          fi
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Setup Node.js
        if: github.event_name != 'push' || steps.release_commit.outputs.skip != 'true'
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
          cache: npm

      - name: Install dependencies
        if: github.event_name != 'push' || steps.release_commit.outputs.skip != 'true'
        run: npm ci

      - name: Prepare isolated HOME
        if: github.event_name != 'push' || steps.release_commit.outputs.skip != 'true'
        run: |
          HOME_DIR="$RUNNER_TEMP/agent-badge-home"
          mkdir -p "$HOME_DIR"
          echo "HOME=$HOME_DIR" >> "$GITHUB_ENV"

      - name: Typecheck
        if: github.event_name != 'push' || steps.release_commit.outputs.skip != 'true'
        run: npm run typecheck

      - name: Verify clean checkout release path
        if: github.event_name != 'push' || steps.release_commit.outputs.skip != 'true'
        run: npm run verify:clean-checkout

      - name: Detect publish impact
        if: github.event_name == 'push' && steps.release_commit.outputs.skip != 'true'
        id: impact
        run: >-
          npm run release:publish-impact -- --base "${{ github.event.before }}"
          --head "${{ github.sha }}" --github-output "$GITHUB_OUTPUT"

      - name: Stop if this push did not change publishable inputs
        if: github.event_name == 'push' && steps.release_commit.outputs.skip != 'true' && steps.impact.outputs.impacted != 'true'
        run: echo "No publishable inputs changed on main; skipping npm publish."

      - name: Stop if main moved after this workflow started
        if: github.event_name == 'push' && steps.release_commit.outputs.skip != 'true' && steps.impact.outputs.impacted == 'true'
        id: freshness
        run: |
          git fetch origin main
          CURRENT_MAIN=$(git rev-parse origin/main)
          if [ "$CURRENT_MAIN" != "${{ github.sha }}" ]; then
            echo "stale=true" >> "$GITHUB_OUTPUT"
            echo "Main advanced to $CURRENT_MAIN; a newer release run will handle publishing."
            exit 0
          fi
          echo "stale=false" >> "$GITHUB_OUTPUT"

      - name: Read current npm version
        if: (github.event_name != 'push' || steps.release_commit.outputs.skip != 'true') && (github.event_name != 'push' || (steps.impact.outputs.impacted == 'true' && steps.freshness.outputs.stale != 'true'))
        id: registry
        run: |
          echo "version=$(npm view @legotin/agent-badge version)" >> "$GITHUB_OUTPUT"

      - name: Auto-bump publishable package versions
        if: (github.event_name != 'push' || steps.release_commit.outputs.skip != 'true') && (github.event_name != 'push' || (steps.impact.outputs.impacted == 'true' && steps.freshness.outputs.stale != 'true'))
        id: version
        run: >-
          npm run release:auto-version -- --registry-version "${{ steps.registry.outputs.version }}"
          --write --github-output "$GITHUB_OUTPUT"

      - name: Publish npm packages
        if: (github.event_name != 'push' || steps.release_commit.outputs.skip != 'true') && (github.event_name != 'push' || (steps.impact.outputs.impacted == 'true' && steps.freshness.outputs.stale != 'true'))
        run: npm run release

      - name: Commit and push released versions
        if: (github.event_name != 'push' || steps.release_commit.outputs.skip != 'true') && (github.event_name != 'push' || (steps.impact.outputs.impacted == 'true' && steps.freshness.outputs.stale != 'true'))
        id: release_commit_push
        run: |
          if [ "${GITHUB_REF_TYPE}" != "branch" ]; then
            echo "Release workflow must run from a branch ref."
            exit 1
          fi

          TARGET_BRANCH="${GITHUB_REF_NAME}"
          if [ "${TARGET_BRANCH}" != "main" ]; then
            echo "Release workflow only publishes from main. Current ref: ${TARGET_BRANCH}"
            exit 1
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package-lock.json packages/core/package.json packages/agent-badge/package.json packages/create-agent-badge/package.json

          if git diff --cached --quiet; then
            echo "No version file changes to commit."
          else
            git commit -m "chore(release): publish ${{ steps.version.outputs.next_version }}"
            git push origin HEAD:"${TARGET_BRANCH}"
          fi

          echo "release_commit_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Create and push release tags
        if: (github.event_name != 'push' || steps.release_commit.outputs.skip != 'true') && (github.event_name != 'push' || (steps.impact.outputs.impacted == 'true' && steps.freshness.outputs.stale != 'true'))
        run: |
          RELEASE_SHA="${{ steps.release_commit_push.outputs.release_commit_sha }}"
          VERSION="${{ steps.version.outputs.next_version }}"
          TAGS=(
            "v${VERSION}"
            "@legotin/agent-badge-core@${VERSION}"
            "@legotin/agent-badge@${VERSION}"
            "create-agent-badge@${VERSION}"
          )
          PUSH_TAGS=()

          for tag in "${TAGS[@]}"; do
            if git ls-remote --exit-code --tags origin "refs/tags/${tag}" >/dev/null 2>&1; then
              echo "Remote tag already exists: ${tag}"
              continue
            fi

            if ! git rev-parse -q --verify "refs/tags/${tag}" >/dev/null 2>&1; then
              git tag -a "${tag}" "${RELEASE_SHA}" -m "Release ${tag}"
            fi

            PUSH_TAGS+=("${tag}")
          done

          if [ "${#PUSH_TAGS[@]}" -gt 0 ]; then
            git push origin "${PUSH_TAGS[@]}"
          else
            echo "No new tags to push."
          fi

      - name: Create GitHub release
        if: (github.event_name != 'push' || steps.release_commit.outputs.skip != 'true') && (github.event_name != 'push' || (steps.impact.outputs.impacted == 'true' && steps.freshness.outputs.stale != 'true'))
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ steps.version.outputs.next_version }}"
          ROOT_TAG="v${VERSION}"

          if gh release view "${ROOT_TAG}" >/dev/null 2>&1; then
            echo "GitHub release already exists for ${ROOT_TAG}."
            exit 0
          fi

          gh release create "${ROOT_TAG}" \
            --title "${ROOT_TAG}" \
            --generate-notes
