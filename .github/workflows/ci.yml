name: CI

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ['20.x', '22.x', '24.x']
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - name: Prepare isolated HOME
        run: |
          HOME_DIR="$RUNNER_TEMP/agent-badge-home"
          mkdir -p "$HOME_DIR"
          echo "HOME=$HOME_DIR" >> "$GITHUB_ENV"
      - name: Install dependencies
        run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Build
        run: npm run build
      - name: Run tests
        run: npm test -- --run

  scenario-matrix:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24.x'
          cache: npm
      - name: Prepare isolated HOME
        run: |
          HOME_DIR="$RUNNER_TEMP/agent-badge-home"
          mkdir -p "$HOME_DIR"
          echo "HOME=$HOME_DIR" >> "$GITHUB_ENV"
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
      - name: Run release-readiness scenario matrix
        run: npm test -- --run packages/agent-badge/src/commands/release-readiness-matrix.test.ts

  release-readiness:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24.x'
          cache: npm
      - name: Prepare isolated HOME
        run: |
          HOME_DIR="$RUNNER_TEMP/agent-badge-home"
          mkdir -p "$HOME_DIR"
          echo "HOME=$HOME_DIR" >> "$GITHUB_ENV"
      - name: Install dependencies
        run: npm ci
      - name: Verify docs
        run: npm run docs:check
      - name: Verify clean checkout release path
        run: npm run verify:clean-checkout
