name: CI

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ['20.x', '22.x', '24.x']
    env:
      HOME: ${{ runner.temp }}/agent-badge-home
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - name: Prepare isolated HOME
        run: mkdir -p "$HOME"
      - name: Install dependencies
        run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Build
        run: npm run build
      - name: Run tests
        run: npm test -- --run

  scenario-matrix:
    runs-on: ubuntu-latest
    needs: validate
    env:
      HOME: ${{ runner.temp }}/agent-badge-home
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24.x'
          cache: npm
      - name: Prepare isolated HOME
        run: mkdir -p "$HOME"
      - name: Install dependencies
        run: npm ci
      - name: Run release-readiness scenario matrix
        run: npm test -- --run packages/agent-badge/src/commands/release-readiness-matrix.test.ts
