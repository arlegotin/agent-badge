name: CI

on:
  push:
  pull_request:

jobs:
  changeset-discipline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: '24.x'
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Require a changeset for publishable workspace changes (pull request)
        if: github.event_name == 'pull_request'
        run: >-
          npm run release:changeset-check -- --base "${{ github.event.pull_request.base.sha }}"
          --head "${{ github.event.pull_request.head.sha }}"
      - name: Require a changeset for publishable workspace changes (push)
        if: github.event_name == 'push'
        run: >-
          npm run release:changeset-check -- --base "${{ github.event.before }}"
          --head "${{ github.sha }}"

  validate:
    runs-on: ubuntu-latest
    needs: changeset-discipline
    strategy:
      fail-fast: false
      matrix:
        node-version: ['20.x', '22.x', '24.x']
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - name: Prepare isolated HOME
        run: |
          HOME_DIR="$RUNNER_TEMP/agent-badge-home"
          mkdir -p "$HOME_DIR"
          echo "HOME=$HOME_DIR" >> "$GITHUB_ENV"
      - name: Install dependencies
        run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Build
        run: npm run build
      - name: Run tests
        run: npm test -- --run

  scenario-matrix:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24.x'
          cache: npm
      - name: Prepare isolated HOME
        run: |
          HOME_DIR="$RUNNER_TEMP/agent-badge-home"
          mkdir -p "$HOME_DIR"
          echo "HOME=$HOME_DIR" >> "$GITHUB_ENV"
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
      - name: Run release-readiness scenario matrix
        run: npm test -- --run packages/agent-badge/src/commands/release-readiness-matrix.test.ts

  release-readiness:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24.x'
          cache: npm
      - name: Prepare isolated HOME
        run: |
          HOME_DIR="$RUNNER_TEMP/agent-badge-home"
          mkdir -p "$HOME_DIR"
          echo "HOME=$HOME_DIR" >> "$GITHUB_ENV"
      - name: Install dependencies
        run: npm ci
      - name: Verify docs
        run: npm run docs:check
      - name: Verify clean checkout release path
        run: npm run verify:clean-checkout
